<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Is This A Good Deal?</title>
  <meta name="description" content="Paste any product + price. Get a brutally honest verdict. AI-powered deal roaster.">
  <meta property="og:title" content="Is This A Good Deal?">
  <meta property="og:description" content="Paste any product + price. Get a brutally honest verdict.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Is This A Good Deal?">
  <meta name="twitter:description" content="Paste any product + price. Get a brutally honest verdict.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: #888;
      font-size: 1.05rem;
      margin-bottom: 40px;
    }

    .input-area {
      position: relative;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      padding: 16px 18px;
      font-size: 1rem;
      font-family: inherit;
      background: #161616;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      color: #fafafa;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 80px;
    }

    textarea:focus {
      border-color: #3b82f6;
    }

    textarea::placeholder {
      color: #555;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: inherit;
      background: #fafafa;
      color: #0a0a0a;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: -0.01em;
    }

    button:hover {
      background: #e5e5e5;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 32px;
      padding: 24px;
      background: #161616;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      text-align: left;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .result.visible {
      display: block;
    }

    .result .score {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .score-1, .score-2, .score-3 { color: #ef4444; }
    .score-4, .score-5 { color: #f59e0b; }
    .score-6, .score-7 { color: #a3a3a3; }
    .score-8, .score-9, .score-10 { color: #22c55e; }

    .result .body {
      font-size: 0.95rem;
      line-height: 1.65;
      color: #ccc;
    }

    .share-row {
      margin-top: 16px;
      display: flex;
      gap: 8px;
    }

    .share-btn {
      flex: 1;
      padding: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      background: #2a2a2a;
      color: #ccc;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      transition: background 0.15s;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .share-btn:hover {
      background: #333;
      color: #fff;
    }

    .examples {
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .example-chip {
      padding: 8px 14px;
      font-size: 0.8rem;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }

    .example-chip:hover {
      border-color: #444;
      color: #ccc;
    }

    .footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #444;
    }

    .footer a {
      color: #666;
      text-decoration: none;
    }

    .footer a:hover {
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #0a0a0a;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Is This A Good Deal?</h1>
    <p class="subtitle">Paste any product + price. Get a brutally honest verdict.</p>

    <div class="input-area">
      <textarea id="input" placeholder='e.g. "AirPods Pro 2 for $189" or "Mass Gainer 5lb for $62 at Costco"' rows="3"></textarea>
    </div>
    <button id="btn" onclick="judge()">Judge My Purchase</button>

    <div class="result" id="result">
      <div class="score" id="score"></div>
      <div class="body" id="body"></div>
      <div class="share-row">
        <button class="share-btn" onclick="shareTwitter()">Share on X</button>
        <button class="share-btn" onclick="copyResult()">Copy</button>
      </div>
    </div>

    <div class="examples">
      <div class="example-chip" onclick="fill(this)">MacBook Air M4 $1,099</div>
      <div class="example-chip" onclick="fill(this)">Dyson V15 for $749</div>
      <div class="example-chip" onclick="fill(this)">Costco rotisserie chicken $4.99</div>
      <div class="example-chip" onclick="fill(this)">Tesla Model 3 for $38,990</div>
      <div class="example-chip" onclick="fill(this)">Lululemon joggers $128</div>
    </div>

    <p class="footer">
      Made by <a href="https://freedomengineers.tech" target="_blank">Freedom Engineers</a>
    </p>
  </div>

  <script>
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');
    const scoreEl = document.getElementById('score');
    const bodyEl = document.getElementById('body');

    let lastRoast = '';
    let lastProduct = '';

    function fill(el) {
      input.value = el.textContent;
      input.focus();
    }

    async function judge() {
      const text = input.value.trim();
      if (!text) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Judging...';
      result.classList.remove('visible');

      try {
        const res = await fetch('/api/roast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ product: text }),
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        lastProduct = text;
        lastRoast = data.roast;

        // Parse score from response
        const scoreMatch = data.roast.match(/(\d{1,2})\/10/);
        const score = scoreMatch ? parseInt(scoreMatch[1]) : null;
        const restOfRoast = data.roast.replace(/^\d{1,2}\/10\s*[-—]?\s*/, '').trim();

        if (score !== null) {
          scoreEl.textContent = `${score}/10`;
          scoreEl.className = `score score-${score}`;
          bodyEl.textContent = restOfRoast;
        } else {
          scoreEl.textContent = '';
          bodyEl.textContent = data.roast;
        }

        result.classList.add('visible');
      } catch (e) {
        scoreEl.textContent = '';
        bodyEl.textContent = e.message || 'Something broke. Try again.';
        result.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Judge My Purchase';
      }
    }

    function shareTwitter() {
      const scoreMatch = lastRoast.match(/(\d{1,2})\/10/);
      const score = scoreMatch ? scoreMatch[0] : '';
      const short = lastRoast.substring(0, 200);
      const text = `I asked AI if "${lastProduct}" is a good deal:\n\n${score ? score + ' — ' : ''}${short}\n\nisthisthegooddeal.vercel.app`;
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
    }

    function copyResult() {
      navigator.clipboard.writeText(`"${lastProduct}"\n\n${lastRoast}\n\nisthisthegooddeal.vercel.app`);
      const btns = document.querySelectorAll('.share-btn');
      btns[1].textContent = 'Copied!';
      setTimeout(() => btns[1].textContent = 'Copy', 1500);
    }

    // Enter key submits
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        judge();
      }
    });
  </script>
</body>
</html>
